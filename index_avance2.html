<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Reporte Predios — Planificado vs Elaborado</title>
<style>
  body{font-family: system-ui, Arial, sans-serif; margin:16px;}
  .bar{display:flex; gap:16px; align-items:center; flex-wrap:wrap; margin-bottom:12px;}
  .row{display:flex; gap:10px; align-items:center; flex-wrap:wrap}
  input[type="date"]{padding:6px; border:1px solid #ccc; border-radius:6px;}
  button{padding:8px 12px; border:0; background:#0ea5e9; color:#fff; border-radius:8px; cursor:pointer}
  table{border-collapse:collapse; width:100%;}
  th, td{border:1px solid #ddd; padding:6px 8px; text-align:center; vertical-align:top;}
  .wday{font-size:12px; color:#555;}
  .sun{background:#ffd6d6;}
  .sat{background:#e6f8e6;}
  .clickable{cursor:pointer; font-weight:700;}
  .zero{color:#bbb; font-weight:400;}
  .legend{font-size:12px; color:#555; margin-top:8px;}
  .totalrow{background:#eef6ff; font-weight:700;}
  .subrow{background:#f9fafb; color:#555; font-weight:600; text-align:left;}

  /* --- dos columnas pegajosas (RESPONSABLE + TIPO) --- */
  th.sticky{position:sticky; z-index:3; background:#f6f6f6;}
  td.sticky{position:sticky; z-index:2; background:#fff;}
  th.sticky.l1, td.sticky.l1 { left:0;    min-width:180px; }
  th.sticky.l2, td.sticky.l2 { left:180px; min-width:130px; }
  .respname{ font-weight:800; font-size:14px; text-align:left; }

  /* Chips de responsables */
  .chips{display:flex; gap:8px; align-items:center; flex-wrap:wrap}
  .chip{display:inline-flex; align-items:center; gap:6px; padding:6px 10px; border:1px solid #e2e8f0; border-radius:999px; background:#fff; cursor:pointer}
  .chip input{transform:scale(1.1)}
  .chip.active{background:#eef7ff; border-color:#bfdbfe}

  /* Colores para agenda (si no especificas color en BD) */
  .mark { box-shadow: inset 0 0 0 9999px rgba(255, 240, 168, .7); }
  .mark.vacaciones { box-shadow: inset 0 0 0 9999px rgba(255, 227, 136, .85);}
  .mark.interferencias { box-shadow: inset 0 0 0 9999px rgba(255, 245, 157, .9);}
  .mark.bloqueo { box-shadow: inset 0 0 0 9999px rgba(255, 170, 170, .7);}

  #chartWrap{margin-top:18px; border:1px solid #eee; border-radius:10px; padding:14px;}
  #sCurve{width:100%; height:360px;}

  /* inputs override (edición manual) */
  .ovr-input{width:70px; padding:4px 6px; border:1px solid #cbd5e1; border-radius:8px; text-align:center;}

  /* Contenido interno de la celda: número/input + motivo siempre visible */
  .cell{ display:flex; flex-direction:column; align-items:center; gap:2px; }
  .motivo{
    font-size:10px; line-height:1.1; color:#334155;
    max-width:90px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  /* Modal por encima de todo y sin solaparse con sticky */
  .modal-back{display:none; position:fixed; inset:0; background:rgba(0,0,0,.45);
              align-items:center; justify-content:center; z-index:2000;}
  .modal{background:#fff; border-radius:12px; max-width:820px; width:95%;
         padding:16px; box-shadow:0 20px 60px rgba(0,0,0,.35); z-index:2100;}
  .modal h3{margin:0 0 8px;}
  .list{max-height:60vh; overflow:auto; border:1px solid #eee; border-radius:8px; background:#fafafa;}
  .list table{width:100%; border-collapse:collapse;}
  .list th,.list td{border:1px solid #e5e7eb; padding:6px 8px; text-align:left;}
  .no-scroll{overflow:hidden;}

  /* --- Hoy: verde suave con aro sutil --- */
  :root{
  --today-bg: #f5f3ff;                 /* lila muy claro */
  --today-ring: rgba(99,102,241,.30);  /* índigo */
  --today-wash: rgba(99,102,241,.16);  /* velo */
  }
  th.today, td.today{
    background: var(--today-bg) !important; /* sobrepone sat/sun */
    position: relative;
    box-shadow: inset 0 0 0 9999px var(--today-wash);
  }
  th.today::after, td.today::after{
    content:"";
    position:absolute; inset:-1px;
    border:2px solid var(--today-ring);
    border-radius:6px;
    pointer-events:none;
  }
</style>
</head>
<body>

<h1>Reporte — Planificado / Elaborado</h1>

<div class="bar">
  <div class="row">
    <label>Desde: <input id="start" type="date"></label>
    <label>Hasta: <input id="end" type="date"></label>
  </div>
  <div class="row">
    <div>Responsables:</div>
    <label class="chip"><input type="checkbox" class="resp" value="ilan" checked> Ilan</label>
    <label class="chip"><input type="checkbox" class="resp" value="grover" checked> Grover</label>
    <label class="chip"><input type="checkbox" class="resp" value="juan carlos" checked> Juan Carlos</label>
    <label class="chip"><input type="checkbox" class="resp" value="wilber" checked> Wilber</label>
  </div>
  <div class="row">
    <button id="btnRun">Generar</button>
    <button id="btnToggleEdit">Editar Planificado</button>
    <span id="status" style="color:#666"></span>
  </div>
</div>

<div style="overflow:auto; border:1px solid #eee; border-radius:10px;">
  <table id="grid"></table>
</div>
<div class="legend">
  En <b>Planificado</b> puedes editar manualmente el número por día y responsable.<br>
  En <b>Elaborado muestra Sector, Código MTC y Código Preliminar</b>.<br>
</div>

<div id="chartWrap">
  <canvas id="sCurve"></canvas>
</div>

<!-- Modal -->
<div id="modalBack" class="modal-back">
  <div class="modal">
    <h3 id="modalTitle">Detalle</h3>
    <div id="modalList" class="list"></div>
    <div style="text-align:right; margin-top:10px;">
      <button id="btnCloseModal">Cerrar</button>
    </div>
  </div>
</div>

<!-- Libs -->
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>

<script>
  // ====== Credenciales ======
  const SUPABASE_URL = "https://wbzxbfqowlfmmkwqeyam.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndienhiZnFvd2xmbW1rd3FleWFtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTY5ODUwMDQsImV4cCI6MjA3MjU2MTAwNH0.mJJ7yID73tUerWE_aiNw3ZE4o-Q9YrT39YN-iS2CksA";
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // ====== Campos ======
  const ID_FIELD   = "id";
  const CODE_FIELD = "codigo_mtc";
  const PRELIM_FIELD = "codigo_preliminar";
  const SECTOR_FIELD = "comunidad";             // si tu "sector" está en otro campo, cambia aquí
  const RESP_FIELD = "responsable_tecnico";
  const DONE_FIELD = "fecha_elaboracion";
  const PLAN_FIELD = "fecha_planificada";
  const AGENDA_TABLE = "agenda_responsables";

  // ====== Overrides (edición manual de totales) ======
  const OVERRIDE_TABLE = "avance_override";            // responsable_tecnico, fecha, tipo('plan'|'done'), valor
  const EDITABLE_TYPES = { plan: true, done: false };  // editable: plan
  let editMode = false;
  let overridesMap = new Map(); // `${resp}|${fecha}|${tipo}` -> int

  const statusEl = document.getElementById("status");
  const gridEl   = document.getElementById("grid");
  const modalBack = document.getElementById("modalBack");
  const btnCloseModal = document.getElementById("btnCloseModal");
  let chart;

  // ====== Rango por defecto ======
  (function setDefaults(){
    // Inicio fijo: 01/09/2025 (mes 8 = septiembre)
    const startFixed = new Date(2025, 8, 1);

    // Fin = domingo de la semana actual (lunes + 6)
    const today = new Date();
    const monday = new Date(today);
    const dow = monday.getDay();                    // 0=dom, 1=lun, ... 6=sáb
    const diffToMon = (dow === 0 ? -6 : 1 - dow);   // retrocede hasta lunes
    monday.setDate(monday.getDate() + diffToMon);
    const end = new Date(monday);
    end.setDate(end.getDate() + 6);                 // domingo

    document.getElementById("start").value = fmtDate(startFixed);
    document.getElementById("end").value   = fmtDate(end);

    // Chips activas
    document.querySelectorAll('.chip').forEach(lbl=>{
      const cb = lbl.querySelector('input');
      if (cb.checked) lbl.classList.add('active');
      cb.addEventListener('change', ()=> lbl.classList.toggle('active', cb.checked));
    });
  })();

  document.getElementById("btnRun").addEventListener("click", run);
  document.getElementById("btnToggleEdit").addEventListener("click", ()=>{
    editMode = !editMode;
    document.getElementById("btnToggleEdit").textContent =
      editMode ? "Salir de edición" : "Editar Planificado";
    run();
  });
  document.querySelectorAll('.resp').forEach(cb => cb.addEventListener('change', run));

  btnCloseModal.addEventListener('click', closeModal);
  modalBack.addEventListener('click', (e)=>{ if(e.target === modalBack) closeModal(); });

  run();

  function selectedResponsables(){
    const set = new Set();
    document.querySelectorAll('.resp:checked').forEach(cb => set.add(cb.value));
    return set;
  }

  async function run(){
    const start = document.getElementById("start").value;
    const end   = document.getElementById("end").value;
    const allowed = selectedResponsables();
    if(!start || !end){ alert("Selecciona rango de fechas"); return; }
    if(allowed.size === 0){ alert("Selecciona al menos un responsable"); return; }

    status("Cargando…");

    const [rows, agenda, overrides] = await Promise.all([
      fetchAll(),
      fetchAgenda(start, end),
      fetchOverrides(start, end)
    ]);

    overridesMap = buildOverridesMap(overrides);

    const filtered = rows.filter(r => allowed.has((r[RESP_FIELD] ?? "").toString().trim().toLowerCase()));
    status(`Filas: ${rows.length} → filtradas: ${filtered.length}. Generando…`);

    const days = buildDays(new Date(start), new Date(end));
    const { planCounts, doneCounts, cellLists } = buildCounts(filtered, days);

    // Aplica overrides
    applyOverrides(planCounts, doneCounts, days);

    renderGrid(planCounts, doneCounts, days, agenda);
    renderCurve(planCounts, doneCounts, days);
    window._cellLists = cellLists;
    status("Listo.");
  }

  // ====== Datos ======
  async function fetchAll(){
    const page = 1000; let from = 0, all = [];
    while(true){
      const { data, error } = await sb.from("predios").select("*").order(ID_FIELD, { ascending:true }).range(from, from + page - 1);
      if(error){ console.error(error); alert(error.message); break; }
      all = all.concat(data || []);
      if(!data || data.length < page) break;
      from += page;
    }
    return all;
  }

  async function fetchAgenda(start, end){
    const { data, error } = await sb
      .from(AGENDA_TABLE)
      .select("responsable_tecnico, fecha, tipo, motivo, color")
      .gte("fecha", start)
      .lte("fecha", end);
    if(error){ console.warn("agenda:", error.message); return []; }
    return data || [];
  }

  // ====== Overrides ======
  async function fetchOverrides(start, end){
    const { data, error } = await sb
      .from(OVERRIDE_TABLE)
      .select("responsable_tecnico, fecha, tipo, valor")
      .gte("fecha", start)
      .lte("fecha", end);
    if(error){ console.warn("overrides:", error.message); return []; }
    return data || [];
  }

  function buildOverridesMap(overrides){
    const m = new Map();
    (overrides || []).forEach(o=>{
      const key = `${(o.responsable_tecnico||'').toString()}|${o.fecha}|${o.tipo}`;
      m.set(key, Number(o.valor)||0);
    });
    return m;
  }

  function applyOverrides(planCounts, doneCounts, days){
    const dayKeys = days.map(fmtDate);
    const responsables = Object.keys(planCounts);
    for(const resp of responsables){
      for(const k of dayKeys){
        if(EDITABLE_TYPES.plan){
          const kp = `${resp}|${k}|plan`;
          if(overridesMap.has(kp)) planCounts[resp][k] = overridesMap.get(kp);
        }
        if(EDITABLE_TYPES.done){
          const kd = `${resp}|${k}|done`;
          if(overridesMap.has(kd)) doneCounts[resp][k] = overridesMap.get(kd);
        }
      }
    }
  }

  async function saveOverride(resp, fecha, tipo, valor){
    const { error } = await sb
      .from(OVERRIDE_TABLE)
      .upsert(
        { responsable_tecnico: resp, fecha, tipo, valor: Number(valor)||0 },
        { onConflict: "responsable_tecnico,fecha,tipo" }
      );
    if(error) throw error;
    overridesMap.set(`${resp}|${fecha}|${tipo}`, Number(valor)||0);
  }

  // ====== Helpers ======
  function status(msg){ statusEl.textContent = msg; }
  function fmtDate(d){ const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), day=String(d.getDate()).padStart(2,'0'); return `${y}-${m}-${day}`; }
  function toDateOnly(s){ return s ? s.toString().slice(0,10) : null; }
  function buildDays(d1, d2){ const out=[]; const cur=new Date(d1); while(cur<=d2){ out.push(new Date(cur)); cur.setDate(cur.getDate()+1);} return out; }
  function wdayName(d){ return ["dom","lun","mar","mié","jue","vie","sáb"][d.getDay()]; }
  function escapeHtml(s){
    return (s??"").toString().replace(/[&<>"']/g, m => (
      {"&":"&amp;","<":"&lt;","~":"&gt;","\"":"&quot;","'":"&#39;"}[m]
    ));
  }
  const sum = arr => arr.reduce((a,b)=>a+b,0);
  const cumulative = arr => { let s=0; return arr.map(v=> (s+=v)); };

  // Para mostrar el motivo de agenda en la celda
  const motivoHtml = (a) => (a && a.motivo)
    ? `<div class="motivo">${escapeHtml(a.motivo)}</div>`
    : "";

  // Clave YYYY-MM-DD del día de hoy
  const todayKey = (()=>{
    const d = new Date();
    const y = d.getFullYear();
    const m = String(d.getMonth()+1).padStart(2,'0');
    const day = String(d.getDate()).padStart(2,'0');
    return `${y}-${m}-${day}`;
  })();

  function buildCounts(rows, days){
    const dayKeys = days.map(fmtDate);
    const responsables = [...new Set(rows.map(r=>r[RESP_FIELD]).filter(Boolean))].sort((a,b)=>a.localeCompare(b));
    const planCounts = {}, doneCounts = {}, cellLists = { plan:new Map(), done:new Map() };
    responsables.forEach(resp=>{
      planCounts[resp] = Object.fromEntries(dayKeys.map(k=>[k,0]));
      doneCounts[resp] = Object.fromEntries(dayKeys.map(k=>[k,0]));
    });
    rows.forEach(r=>{
      const resp = r[RESP_FIELD]; if(!resp) return;
      const dPlan = toDateOnly(r[PLAN_FIELD]);
      const dDone = toDateOnly(r[DONE_FIELD]);

      // Para modal de Elaborado: guardo campos
      const objForModal = {
        sector: r[SECTOR_FIELD] ?? "",
        codigo_mtc: r[CODE_FIELD] ?? "",
        codigo_preliminar: r[PRELIM_FIELD] ?? ""
      };

      if(dPlan && planCounts[resp] && dPlan in planCounts[resp]){
        planCounts[resp][dPlan] += 1;
        const keyP = `${resp}|${dPlan}`;
        if(!cellLists.plan.has(keyP)) cellLists.plan.set(keyP, []);
        cellLists.plan.get(keyP).push(objForModal);
      }
      if(dDone && doneCounts[resp] && dDone in doneCounts[resp]){
        doneCounts[resp][dDone] += 1;
        const keyD = `${resp}|${dDone}`;
        if(!cellLists.done.has(keyD)) cellLists.done.set(keyD, []);
        cellLists.done.get(keyD).push(objForModal);
      }
    });
    return { planCounts, doneCounts, cellLists };
  }

  // Mapear agenda a { "Resp|YYYY-MM-DD": {tipo,motivo,color} }
  function buildAgendaMap(agenda){
    const m = new Map();
    agenda.forEach(a=>{
      const resp = (a.responsable_tecnico ?? "").toString();
      const key = `${resp}|${a.fecha}`;
      m.set(key, a);
    });
    return m;
  }

  // ====== Render tabla con TOTALES y celdas unidas ======
  function renderGrid(planCounts, doneCounts, days, agenda){
    const agendaMap = buildAgendaMap(agenda);
    const responsables = Object.keys(planCounts);
    const dayKeys = days.map(fmtDate);

    // Totales por columna (por día) y grandes totales
    const planTotalsByDay = dayKeys.map(k => responsables.reduce((acc,r)=> acc + (planCounts[r][k]||0), 0));
    const doneTotalsByDay = dayKeys.map(k => responsables.reduce((acc,r)=> acc + (doneCounts[r][k]||0), 0));
    const grandPlan = sum(planTotalsByDay);
    const grandDone = sum(doneTotalsByDay);

    let html = "";

    // Encabezado (dos sticky + TOTAL)
    html += "<tr>";
    html += `<th class="sticky l1">RESPONSABLE</th>`;
    html += `<th class="sticky l2">TIPO</th>`;
    days.forEach(d=>{
      const k = fmtDate(d);
      const dd = String(d.getDate()).padStart(2,'0');
      const cls = (k===todayKey ? "today " : "") + (d.getDay()===0 ? "sun" : d.getDay()===6 ? "sat" : "");
      html += `<th class="${cls}">${dd}<div class="wday">${wdayName(d)}</div></th>`;
    });
    html += `<th>TOTAL</th>`;
    html += "</tr>";

    // Filas por responsable (Planificado + Elaborado)
    responsables.forEach(resp=>{
      const planRowTotal = dayKeys.reduce((acc,k)=> acc + (planCounts[resp][k]||0), 0);
      const doneRowTotal = dayKeys.reduce((acc,k)=> acc + (doneCounts[resp][k]||0), 0);

      // ---- Fila 1: Planificado (EDITABLE)
      html += `<tr>`;
      html += `<td class="sticky l1 respname" rowspan="2">${escapeHtml(resp)}</td>`;
      html += `<td class="sticky l2 subrow">Planificado</td>`;
      days.forEach(d=>{
        const k = fmtDate(d);
        const n = planCounts[resp][k] || 0;
        const clsDay = (k===todayKey ? "today " : "") + (d.getDay()===0 ? "sun" : d.getDay()===6 ? "sat" : "");

        const a = agendaMap.get(`${resp}|${k}`);
        const clsMark = a ? `mark ${ (a.tipo||'').toLowerCase() }` : "";
        const style = a && a.color ? ` style="box-shadow: inset 0 0 0 9999px ${a.color};"` : "";

        if(editMode && EDITABLE_TYPES.plan){
          const okey = `${resp}|${k}|plan`;
          const val = overridesMap.has(okey) ? overridesMap.get(okey) : n;
          html += `<td class="${clsDay} ${clsMark}"${style}>
            <div class="cell">
              <input class="ovr-input" type="number" min="0"
                     data-resp="${escapeHtml(resp)}" data-date="${k}" data-tipo="plan"
                     value="${val}">
              ${motivoHtml(a)}
            </div>
          </td>`;
        }else{
          html += `<td class="${clsDay} ${clsMark}"${style}>
            <div class="cell">
              <div>${n || 0}</div>
              ${motivoHtml(a)}
            </div>
          </td>`;
        }
      });
      html += `<td class="totalrow">${planRowTotal}</td>`;
      html += `</tr>`;

      // ---- Fila 2: Elaborado (NO editable; clic abre modal con detalles)
      html += `<tr>`;
      html += `<td class="sticky l2 subrow">Elaborado</td>`;
      days.forEach(d=>{
        const k = fmtDate(d);
        const n = doneCounts[resp][k] || 0;
        const clsDay = (k===todayKey ? "today " : "") + (d.getDay()===0 ? "sun" : d.getDay()===6 ? "sat" : "");

        const a = agendaMap.get(`${resp}|${k}`);
        const clsMark = a ? `mark ${ (a.tipo||'').toLowerCase() }` : "";
        const style = a && a.color ? ` style="box-shadow: inset 0 0 0 9999px ${a.color};"` : "";

        if(n > 0){
          html += `<td class="${clsDay} ${clsMark} clickable"${style}
                    onclick="openCell('done','${escapeHtml(resp)}','${k}')">
            <div class="cell">
              <div>${n}</div>
              ${motivoHtml(a)}
            </div>
          </td>`;
        }else{
          html += `<td class="${clsDay} ${clsMark} zero"${style}>
            <div class="cell">
              <div>0</div>
              ${motivoHtml(a)}
            </div>
          </td>`;
        }
      });
      html += `<td class="totalrow">${doneRowTotal}</td>`;
      html += `</tr>`;
    });

    // ---- Fila TOTAL Planificado + Elaborado
    html += `<tr class="totalrow">`;
    html += `<td class="sticky l1 totalrow" rowspan="2">TOTAL</td>`;
    html += `<td class="sticky l2 totalrow">Planificado</td>`;
    days.forEach((d, i)=>{
      const k = fmtDate(d);
      const clsDay = (k===todayKey ? "today " : "") + (d.getDay()===0 ? "sun" : d.getDay()===6 ? "sat" : "");
      html += `<td class="${clsDay} totalrow">${planTotalsByDay[i]}</td>`;
    });
    html += `<td class="totalrow">${grandPlan}</td>`;
    html += `</tr>`;

    html += `<tr class="totalrow">`;
    html += `<td class="sticky l2 totalrow">Elaborado</td>`;
    days.forEach((d, i)=>{
      const k = fmtDate(d);
      const clsDay = (k===todayKey ? "today " : "") + (d.getDay()===0 ? "sun" : d.getDay()===6 ? "sat" : "");
      html += `<td class="${clsDay} totalrow">${doneTotalsByDay[i]}</td>`;
    });
    html += `<td class="totalrow">${grandDone}</td>`;
    html += `</tr>`;

    gridEl.innerHTML = html;
  }

  // Guardar override al cambiar un input (PLANIFICADO)
  gridEl.addEventListener("change", async (e)=>{
    const inp = e.target.closest(".ovr-input");
    if(!inp) return;
    const resp  = inp.getAttribute("data-resp");
    const fecha = inp.getAttribute("data-date");
    const tipo  = inp.getAttribute("data-tipo"); // 'plan'
    const valor = Number(inp.value)||0;

    try{
      await saveOverride(resp, fecha, tipo, valor);
      status("Guardado ✓");
      run(); // refresca totales y curva
    }catch(err){
      console.error(err);
      status("Error al guardar: " + (err?.message||""));
    }
  });

  // ====== Curva S ======
  function renderCurve(planCounts, doneCounts, days){
    const labels = days.map(d => String(d.getDate()).padStart(2,'0'));
    const dayKeys = days.map(fmtDate);
    const rPlan = Object.keys(planCounts);
    const rDone = Object.keys(doneCounts);
    const planDaily = dayKeys.map(k => rPlan.reduce((acc,r)=>acc + (planCounts[r][k]||0), 0));
    const doneDaily = dayKeys.map(k => rDone.reduce((acc,r)=>acc + (doneCounts[r][k]||0), 0));
    const planCum = cumulative(planDaily);
    const doneCum = cumulative(doneDaily);

    const ctx = document.getElementById('sCurve').getContext('2d');
    if (chart) chart.destroy();
    Chart.register(ChartDataLabels);
    chart = new Chart(ctx, {
      type: 'line',
      data: {
        labels,
        datasets: [
          { label: 'Acum Planificado', data: planCum, tension: 0.25, pointRadius: 3 },
          { label: 'Acum Elaborado',   data: doneCum, tension: 0.25, pointRadius: 3 }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { position: 'top' },
          datalabels: { formatter: v => (v>0? v : ''), align: 'top', anchor: 'end', font: { size: 10 } },
          tooltip: { enabled: true }
        },
        scales: { y: { beginAtZero: true } }
      }
    });
  }

  // ====== Modal (Elaborado) ======
  function openCell(kind, resp, ymd){
    const map = window._cellLists.done;   // solo elaborado
    const list = map.get(`${resp}|${ymd}`) || [];

    // Construir tabla con múltiples campos
    const rowsHtml = list.length
      ? `<table>
           <thead>
             <tr>
               <th>Sector</th>
               <th>Código MTC</th>
               <th>Código Preliminar</th>
             </tr>
           </thead>
           <tbody>
             ${list.map(o=>`
               <tr>
                 <td>${escapeHtml(o.sector)}</td>
                 <td>${escapeHtml(o.codigo_mtc)}</td>
                 <td>${escapeHtml(o.codigo_preliminar)}</td>
               </tr>`).join("")}
           </tbody>
         </table>`
      : "<div style='padding:8px'><em>Sin códigos</em></div>";

    document.getElementById("modalTitle").textContent = `Elaborado — ${resp} — ${ymd}`;
    document.getElementById("modalList").innerHTML = rowsHtml;

    document.body.classList.add('no-scroll');
    modalBack.style.display = "flex";
  }
  function closeModal(){
    modalBack.style.display = "none";
    document.body.classList.remove('no-scroll');
  }
</script>
</body>
</html>
