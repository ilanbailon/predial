<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Resumen — Predios (compacto)</title>

  <!-- DataTables -->
  <link rel="stylesheet" href="https://cdn.datatables.net/2.0.3/css/dataTables.dataTables.min.css">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.datatables.net/2.0.3/js/dataTables.min.js"></script>

  <!-- Supabase -->
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <link rel="stylesheet" href="assets/index_resumen/index.css">

</head>
<body>
  <header>
    <h1>Resumen — Predios</h1>
    <div class="sub">Compacto, sin filtros globales. <a class="sub" href="index_predios.html">Ir al index de edición</a></div>
  </header>

  <main>
    <div class="card" id="status">Cargando…</div>

    <!-- Totales (badges) -->
    <div class="card">
      <strong>Totales por Entregable</strong>
      <div id="totalsBadges" class="badges" style="margin-top:6px"></div>
    </div>

    <!-- Pivots -->
    <div class="card">
      <strong>Comunidad × Entregable</strong>
      <table id="pvComEnt" class="display compact">
        <thead id="pvComEntHead"></thead>
        <tbody id="pvComEntBody"></tbody>
        <tfoot id="pvComEntFoot"></tfoot>
      </table>
    </div>

    <div class="card">
      <strong>Responsable × Entregable</strong>
      <table id="pvRespEnt" class="display compact">
        <thead id="pvRespEntHead"></thead>
        <tbody id="pvRespEntBody"></tbody>
        <tfoot id="pvRespEntFoot"></tfoot>
      </table>
    </div>

    <div class="card">
      <strong>Comunidad × Responsable</strong>
      <table id="pvComResp" class="display compact">
        <thead id="pvComRespHead"></thead>
        <tbody id="pvComRespBody"></tbody>
        <tfoot id="pvComRespFoot"></tfoot>
      </table>
    </div>
  </main>

  <!-- Modal (drill-down pro) -->
  <div id="back" class="back">
    <div class="modal">
      <h4 id="mdTitle">Detalle</h4>
      <div id="mdContext" style="margin:4px 0 8px 0; color:#64748b; font-size:12px"></div>

      <div id="mdBadges" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px"></div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:8px">
        <div>
          <h5 style="margin:0 0 6px">Desglose A</h5>
          <table style="width:100%" id="mdBreak1">
            <thead><tr><th>Clave</th><th style="text-align:right">#</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
        <div>
          <h5 style="margin:0 0 6px">Desglose B</h5>
          <table style="width:100%" id="mdBreak2">
            <thead><tr><th>Clave</th><th style="text-align:right">#</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </div>

      <div class="list" id="mdList"></div>

      <div style="display:flex;justify-content:space-between;gap:8px;margin-top:8px">
        <div style="display:flex;gap:6px">
          <button id="btnCopy">Copiar códigos</button>
          <button id="btnCSV">Exportar CSV</button>
          <a id="btnGo" class="sub" target="_blank" href="#">Abrir en index de edición</a>
        </div>
        <button onclick="closeModal()">Cerrar</button>
      </div>
    </div>
  </div>

<script src="assets/index_resumen/index.js"></script>

</body>
</html>
