<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Predios — Filtros + Edición + Exportar</title>

  <!-- DataTables -->
  <link rel="stylesheet" href="https://cdn.datatables.net/2.0.3/css/dataTables.dataTables.min.css">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.datatables.net/2.0.3/js/dataTables.min.js"></script>

  <!-- Supabase -->
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <!-- SheetJS para exportar -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <link rel="stylesheet" href="assets/index_predios2/index.css">

</head>
<body>
  <header class="appbar">
    <h1>Predios — Filtros + Edición + Exportar</h1>
    <div class="toolbar">
      <label>Comunidad:
        <select id="f_comunidad"><option value="">(Todos)</option></select>
      </label>
      <label>Entregable:
        <select id="f_entregable"><option value="">(Todos)</option></select>
      </label>
      <label>Responsable técnico:
        <select id="f_responsable"><option value="">(Todos)</option></select>
      </label>
      <label>Fecha elab.:
        <select id="f_fecha"><option value="">(Todos)</option></select>
      </label>
      <button id="btnClear">Limpiar filtros</button>
      <button id="btnExport">Exportar</button>
    </div>
  </header>

  <main>
    <div class="card">
      <table id="tabla" class="display">
        <thead>
          <tr id="thead-titles"></tr>
        </thead>
        <tbody id="tbody-rows"></tbody>
      </table>
    </div>
  </main>

  <!-- Modal Detalle -->
  <div class="modal-backdrop" id="modalBackdrop" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <header>
        <div>
          <div id="modalTitle" style="font-weight:800;">Detalle del predio</div>
          <div id="modalSubtitle" class="tag"></div>
        </div>
        <button class="btn ghost" id="btnCloseModal" title="Cerrar">✕</button>
      </header>
      <div class="modal-body">
        <div style="margin-bottom:10px;">
          <span class="tag">ID:</span>
          <span class="badge" id="modalIdBadge"></span>
        </div>
        <div class="kv-grid" id="kvGrid"></div>
      </div>
      <div class="modal-footer">
        <span id="saveHint" class="tag" style="margin-right:auto;"></span>
        <button class="btn secondary" id="btnEdit">Editar</button>
        <button class="btn secondary" id="btnCancel">Cancelar</button>
        <button class="btn ok" id="btnSave" disabled>Guardar cambios</button>
      </div>
    </div>
  </div>

  <!-- Modal Exportar -->
  <div class="modal-backdrop" id="exportBackdrop" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="exportTitle">
      <header>
        <div id="exportTitle" style="font-weight:800;">Exportar datos</div>
        <button class="btn ghost" id="btnCloseExport" title="Cerrar">✕</button>
      </header>
      <div class="modal-body">
        <div class="form-row">
          <label for="ex_comunidad">Comunidad</label>
          <select id="ex_comunidad"><option value="">(Todas)</option></select>
        </div>
        <div class="form-row">
          <label for="ex_entregable">Entregable</label>
          <select id="ex_entregable"><option value="">(Todos)</option></select>
        </div>
        <div class="form-row">
          <label for="ex_responsable">Responsable técnico</label>
          <select id="ex_responsable"><option value="">(Todos)</option></select>
        </div>

        <div class="form-row">
          <label>Columnas</label>
          <div>
            <div style="margin-bottom:6px;">
              <label><input type="checkbox" id="ex_select_all" checked> Seleccionar todo</label>
            </div>
            <div id="ex_cols" class="ex-cols"></div>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <span class="tag" style="margin-right:auto;">Se exporta desde <b>todos</b> los registros, no solo la vista.</span>
        <button class="btn secondary" id="btnExportCSV">CSV</button>
        <button class="btn ok" id="btnExportXLSX">Excel (.xlsx)</button>
      </div>
    </div>
  </div>

<script src="assets/index_predios2/index.js"></script>

</body>
</html>
