<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Predios + Áreas Afectadas (orden + redondeo)</title>

  <!-- DataTables -->
  <link rel="stylesheet" href="https://cdn.datatables.net/2.0.3/css/dataTables.dataTables.min.css">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.datatables.net/2.0.3/js/dataTables.min.js"></script>

  <!-- Supabase -->
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <!-- SheetJS -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <link rel="stylesheet" href="assets/index_predios_verificador/index.css">

</head>
<body>
  <header class="appbar">
    <h1>Predios + Áreas Afectadas</h1>
    <div class="toolbar">
      <label>Comunidad:
        <select id="f_comunidad"><option value="">(Todos)</option></select>
      </label>
      <label>Entregable:
        <select id="f_entregable"><option value="">(Todos)</option></select>
      </label>
      <label>Responsable técnico:
        <select id="f_responsable"><option value="">(Todos)</option></select>
      </label>
      <label>Fecha elab.:
        <select id="f_fecha"><option value="">(Todos)</option></select>
      </label>
      <button id="btnClear">Limpiar filtros</button>
      <button id="btnExport">Exportar (filtrado)</button>
      <span id="msg" class="status"></span>
    </div>
  </header>

  <main>
    <div class="card">
      <table id="tabla" class="display">
        <thead>
          <tr id="thead-titles"></tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </main>

  <!-- Modal Áreas -->
  <div class="back" id="areasBack">
    <div class="modal">
      <header>
        <div>
          <div style="font-weight:800">Agregar áreas afectadas</div>
          <div class="tag">MTC: <b id="mtcLbl"></b> · Predio ID: <span id="predioLbl" class="tag"></span></div>
        </div>
        <button class="btn secondary" id="areasClose">Cerrar</button>
      </header>
      <div class="body">
        <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:10px">
          <input id="areasQ" placeholder="Buscar cod_prel… (solo código)" />
          <label class="tag" style="display:inline-flex;gap:6px;align-items:center;">
            Alcance:
            <select id="areasScope">
              <option value="all" selected>Todos</option>
              <option value="unassigned">Sólo no asignados</option>
              <option value="current_or_unassigned">Este MTC + no asignados</option>
            </select>
          </label>
          <button class="btn secondary" id="areasSearch">Buscar</button>
          <span id="areasMsg" class="status" style="margin-left:auto"></span>
        </div>
        <div id="areasList" class="results"></div>
      </div>
      <div class="foot">
        <button class="btn" id="areasAdd">Agregar seleccionados</button>
      </div>
    </div>
  </div>

  <!-- Modal Editar cod_prel (desde chip) -->
  <div class="back" id="editBack">
    <div class="modal">
      <header>
        <div>
          <div style="font-weight:800">Editar área afectada</div>
          <div class="tag">cod_prel: <b id="editCodP"></b> · id: <span id="editId" class="tag"></span></div>
        </div>
        <button class="btn secondary" id="editClose">Cerrar</button>
      </header>
      <div class="body">
        <div style="display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px">
          <label>Prog. Inicial<br><input id="e_ini"></label>
          <label>Prog. Final<br><input id="e_fin"></label>

          <label>area (m²)<br><input id="e_area" type="number"></label>
          <label>area_hec<br><input id="e_area_hec" type="number" disabled></label>

          <label>matriz<br><input id="e_matriz" type="number"></label>
          <label>matriz_hec<br><input id="e_matriz_hec" type="number" disabled></label>

          <label>lado<br><input id="e_lado"></label>
          <label>perimetro_suma<br><input id="e_per" type="number"></label>
        </div>
      </div>
      <div class="foot">
        <button class="btn" id="editSave">Guardar</button>
      </div>
    </div>
  </div>

  <!-- Overlay de carga -->
  <div class="loading-back" id="loading">
    <div class="loading-box">
      <div class="spinner"></div>
      <div><b id="loadingText">Procesando…</b><div class="tag" id="loadingSub"></div></div>
    </div>
  </div>

<script src="assets/index_predios_verificador/index.js"></script>

</body>
</html>
